  <meta charset="UTF-8" />
  <title>Shadow + iFrame Metrics Demo</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .section {
      margin-bottom: 40px;
    }

    iframe {
      width: 100%;
      height: 220px;
      border: 2px solid #444;
    }
  </style>
</head>

<body>

  <h1>Shadow / iFrame Elements Metrics Demo</h1>

  <!-- Form Section -->
  <div id="form-section" class="section">
    <h2>Contact Form</h2>
    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label for="user-name" class="form-label">Name:</label>
        <input type="text" id="user-name" class="form-input text-input" name="name" placeholder="Enter your name" />
      </div>

      <div class="form-group">
        <label for="user-email" class="form-label">Email:</label>
        <input type="text" id="user-email" class="form-input text-input email-input" name="email"
          placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="user-message" class="form-label">Message:</label>
        <textarea id="user-message" class="form-input textarea-input" name="message" rows="5"
          placeholder="Enter your message"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="submit-button">Submit</button>
    </form>
  </div>

  <!-- Standard Page -->
  <div id="product-page" class="section">
    <button class="add-to-cart">Standard Add to Cart</button>
  </div>

  <!-- Shadow DOM -->
  <div id="product-card" class="section"></div>

  <!-- Nested Shadow DOM -->
  <div id="search-results" class="section"></div>

  <!-- iFrame -->
  <iframe id="site-header"></iframe>

  <!-- iFrame with Shadow DOM -->
  <iframe id="checkout"></iframe>

  <!-- Shadow containing iframe -->
  <div id="order-summary" class="section"></div>

  <script>
    /* ---------------------------
       #product-card >> button.add-to-cart
    ---------------------------- */
    const productCard = document.getElementById("product-card");
    const pcShadow = productCard.attachShadow({ mode: "open" });

    pcShadow.innerHTML = `
  <button class="add-to-cart">Shadow Add to Cart</button>
`;

    /* ---------------------------
       #search-results >> filter-panel >> input
    ---------------------------- */
    const searchResults = document.getElementById("search-results");
    const srShadow = searchResults.attachShadow({ mode: "open" });

    srShadow.innerHTML = `<filter-panel></filter-panel>`;

    class FilterPanel extends HTMLElement {
      constructor() {
        super();
        const shadow = this.attachShadow({ mode: "open" });
        shadow.innerHTML = `
      <label>
        <input type="checkbox" /> Filter Option
      </label>
    `;
      }
    }
    customElements.define("filter-panel", FilterPanel);

    /* ---------------------------
       iframe#site-header >>> .mini-cart-icon
    ---------------------------- */
    const siteHeader = document.getElementById("site-header");
    siteHeader.srcdoc = `
  <button class="mini-cart-icon">Mini Cart</button>
`;

    /* ---------------------------
       iframe#checkout >>> #cart >> button.confirm-payment
    ---------------------------- */
    const checkout = document.getElementById("checkout");
    checkout.srcdoc = `
  <div id="cart"></div>
  <script>
    const cart = document.getElementById("cart");
    const shadow = cart.attachShadow({ mode: "open" });
    shadow.innerHTML = '<button class="confirm-payment">Pay Now</button>';
  <\/script>
`;

    /* ---------------------------
       #order-summary >> iframe >>> .place-order
    ---------------------------- */
    const orderSummary = document.getElementById("order-summary");
    const osShadow = orderSummary.attachShadow({ mode: "open" });

    osShadow.innerHTML = `
  <iframe id="summary-frame"></iframe>
`;

    const summaryFrame = osShadow.querySelector("#summary-frame");
    summaryFrame.srcdoc = `
  <button class="place-order">Place Order</button>
`;
  </script>

</body>

</html>
